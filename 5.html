<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Micro-OS · Web App Platform</title>

    <!-- ─── Three.js Import Map (مطلوب للعبــة المضمنة) ─── -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
            }
        }
    </script>

    <style>
        :root {
            --bg: #000;
            --surface: rgba(18, 18, 28, 0.96);
            --accent: #00e5ff;
            --accent-dim: #00e5ff55;
            --danger: #ff3b5c;
            --warn: #ffb300;
            --text: #e8e8e8;
            --muted: #999;
            --radius: 14px;
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 14px);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: var(--font);
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            direction: rtl;
        }

        /* ── BOOT SCREEN (Power On) ── */
        #boot-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
        }
        #boot-btn {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 4px;
            box-shadow: 0 0 40px var(--accent-dim);
            transition: all var(--transition);
            text-transform: uppercase;
        }
        #boot-btn:active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 60px var(--accent);
        }

        /* ── SPLASH ── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 99998;
            background: #000;
            display: none;
            align-items: center;
            justify-content: center;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }
        #splash.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #splash video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            background: #000;
        }
        #splash-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.7) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: calc(40px + var(--safe-bottom));
        }
        #btn-skip {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 12px 34px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1.5px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all var(--transition);
            opacity: 0.85;
        }
        #btn-skip:active {
            background: rgba(255, 255, 255, 0.18);
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            opacity: 1;
            transform: scale(1.04);
        }
        #splash-progress {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            width: min(240px, 60vw);
            height: 3px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            overflow: hidden;
        }
        #splash-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fff, var(--accent));
            width: 0%;
            border-radius: 4px;
            transition: width 0.2s linear;
        }
        #splash-error {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            color: #ff8888;
            font-size: 12px;
            text-align: center;
            display: none;
            max-width: 80vw;
        }

        /* ── DASHBOARD ── */
        #dashboard {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #dashboard.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #dashboard-bg-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            background: #000;
            transition: opacity 0.5s ease;
        }
        #dashboard-bg-video.video-hidden {
            opacity: 0 !important;
        }
        #dashboard-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: rgba(0, 0, 0, 0.45);
            pointer-events: none;
        }
        #dashboard-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
            max-width: 920px;
            padding: 16px;
            overflow-y: auto;
            max-height: 100vh;
            -webkit-overflow-scrolling: touch;
        }
        #dashboard-title {
            color: #fff;
            font-size: clamp(18px, 5vw, 26px);
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
            text-align: center;
            flex-shrink: 0;
            margin: 0;
        }
        #app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 580px;
            justify-items: center;
            padding: 8px;
        }
        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: transform var(--transition);
            position: relative;
        }
        .app-card:active {
            transform: scale(0.9);
        }
        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: all var(--transition);
            background: rgba(20, 20, 30, 0.8);
            pointer-events: none;
        }
        .app-card:hover .app-icon,
        .app-card:active .app-icon {
            border-color: var(--accent);
            box-shadow: 0 0 28px var(--accent-dim), 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        .app-card.long-press .app-icon {
            border-color: var(--warn) !important;
            box-shadow: 0 0 32px rgba(255, 179, 0, 0.55), 0 8px 24px rgba(0, 0, 0, 0.5) !important;
            animation: pulse-warn 0.45s ease-in-out;
        }
        @keyframes pulse-warn {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.12);
            }
        }
        .app-name {
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            max-width: 82px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }

        /* ── FAB ── */
        #fab-add {
            position: fixed;
            bottom: calc(24px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            border: none;
            font-size: 26px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(0, 229, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            line-height: 1;
        }
        #fab-add.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #fab-add:active {
            background: #4df0ff;
            box-shadow: 0 6px 30px rgba(0, 229, 255, 0.7);
            transform: translateX(-50%) scale(1.1);
        }

        /* ── GAME HOST ── */
        #game-host {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
            display: none;
            overflow: hidden;
        }
        #game-host.active {
            display: block;
        }
        #game-host iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ── BACK BUTTON ── */
        #btn-back {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 99999;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.78);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.45);
            font-size: 18px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all var(--transition);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.55);
        }
        #btn-back.visible {
            display: flex;
        }
        #btn-back:active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            transform: scale(1.08);
        }
        #btn-back svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── MODALS ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100001;
            background: rgba(0, 0, 0, 0.82);
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 16px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            padding: 22px 18px;
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            color: var(--text);
            max-height: 88vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            text-align: center;
            font-size: 16px;
            color: #fff;
            margin: 0;
            letter-spacing: 1px;
        }
        .modal-box label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            margin-bottom: -6px;
        }
        .modal-box input[type="text"],
        .modal-box textarea,
        .modal-box input[type="range"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 13px;
            font-family: var(--font);
            direction: ltr;
            outline: none;
            transition: border var(--transition);
            resize: vertical;
        }
        .modal-box input[type="text"]:focus,
        .modal-box textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-dim);
        }
        .modal-box textarea {
            min-height: 110px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre;
            overflow-x: auto;
        }
        .modal-box input[type="range"] {
            -webkit-appearance: none;
            height: 7px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 4px;
            padding: 0;
            cursor: pointer;
        }
        .modal-box input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 12px var(--accent-dim);
        }
        .modal-box .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .modal-box button {
            flex: 1;
            min-width: 70px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: all var(--transition);
            font-family: var(--font);
            text-align: center;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: #4df0ff;
            box-shadow: 0 0 18px var(--accent-dim);
        }
        .btn-ghost {
            background: transparent;
            color: #fff;
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border-color: var(--danger);
        }
        .btn-danger:hover {
            background: rgba(255, 59, 92, 0.2);
            box-shadow: 0 0 14px rgba(255, 59, 92, 0.35);
        }
        .btn-full {
            width: 100%;
            flex: none;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .toggle-row span {
            color: #fff;
            font-size: 13px;
        }
        .toggle-switch {
            position: relative;
            width: 46px;
            height: 26px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 26px;
            transition: var(--transition);
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: var(--transition);
        }
        .toggle-switch input:checked+.toggle-slider {
            background: var(--accent);
        }
        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(20px);
        }
        .storage-info {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
            word-break: break-all;
        }
        .storage-info strong {
            color: var(--accent);
        }

        @media (max-width: 420px) {
            #app-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            .app-icon {
                width: 58px;
                height: 58px;
                border-radius: 14px;
            }
            .app-name {
                font-size: 10px;
                max-width: 62px;
            }
            #btn-back {
                top: 8px;
                right: 8px;
                width: 36px;
                height: 36px;
            }
            #btn-skip {
                padding: 10px 26px;
                font-size: 13px;
            }
            #fab-add {
                width: 42px;
                height: 42px;
                font-size: 22px;
                bottom: calc(18px + var(--safe-bottom));
            }
            .modal-box {
                padding: 18px 14px;
                gap: 10px;
                max-width: 94vw;
            }
            .modal-box h3 {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ═══════════════════════ BOOT SCREEN ═══════════════════════ -->
    <div id="boot-screen">
        <button id="boot-btn">⚡ تشغيل النظام</button>
    </div>

    <!-- ═══════════════════════ SPLASH ═══════════════════════ -->
    <div id="splash">
        <video id="splash-video" muted playsinline preload="auto" crossorigin="anonymous"
        src="https://raw.githubusercontent.com/korpika/hoolgem/main/A01.mp4"></video>
        <audio id="splash-audio" preload="auto" crossorigin="anonymous"
        src="https://raw.githubusercontent.com/korpika/hoolgem/main/A02.mp3"></audio>
        <div id="splash-overlay">
            <button id="btn-skip">⏭ تخطي</button>
        </div>
        <div id="splash-progress"><div id="splash-progress-bar"></div></div>
        <div id="splash-error"></div>
    </div>

    <!-- ═══════════════════════ DASHBOARD ═══════════════════════ -->
    <div id="dashboard" class="hidden">
        <video id="dashboard-bg-video" loop muted playsinline preload="auto" crossorigin="anonymous"
        src="https://raw.githubusercontent.com/korpika/hoolgem/main/A03.mp4"></video>
        <audio id="dashboard-audio" loop preload="auto" crossorigin="anonymous"
        src="https://raw.githubusercontent.com/korpika/hoolgem/main/A04.mp3"></audio>
        <div id="dashboard-overlay"></div>
        <div id="dashboard-content">
            <h1 id="dashboard-title">⚡ منصة التطبيقات</h1>
            <div id="app-grid"></div>
        </div>
    </div>

    <!-- ═══════════════════════ FAB ═══════════════════════ -->
    <button id="fab-add" class="hidden" title="إضافة تطبيق">＋</button>

    <!-- ═══════════════════════ GAME TEMPLATE (الكود المرفق - ممنوع التعديل على منطقه الداخلي) ═══════════════════════ -->
    <template id="game-template">
        <!DOCTYPE html>
        <html lang="ar" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>Hool Gem</title>
            <script type="importmap">
                {"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.150.0/examples/jsm/"}}
            </script>
            <style>
                body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;user-select:none;font-family:sans-serif}
                #game-wrapper{position:absolute;top:0;left:0;width:100vw;height:100vh;overflow:hidden}
                @media screen and (orientation:portrait){#game-wrapper{width:100vh;height:100vw;transform:rotate(90deg);transform-origin:center;top:50%;left:50%;margin-top:-50vw;margin-left:-50vh}}
                #canvas-container{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1;touch-action:none}
                #ui-layer{position:absolute;top:15px;left:15px;z-index:10;display:flex;flex-direction:column;gap:8px}
                .hud-btn{background:rgba(0,0,0,0.85);color:#00f2fe;border:1px solid #00f2fe;border-radius:5px;padding:8px 12px;font-weight:bold;cursor:pointer;transition:0.2s;font-size:11px;text-align:center}
                .hud-btn.active-mode{background:#00f2fe;color:#000;box-shadow:0 0 10px #00f2fe}
                #path-panel{position:absolute;top:15px;right:-250px;width:180px;background:rgba(10,10,10,0.95);border:1px solid #00f2fe;border-radius:6px;padding:10px;display:flex;flex-direction:column;gap:6px;z-index:10;transition:right 0.3s ease;box-shadow:-5px 5px 15px rgba(0,0,0,0.8);max-height:90vh}
                #path-panel.open{right:15px}
                .panel-title{color:#00f2fe;font-size:13px;text-align:center;margin:0 0 5px 0;font-weight:bold}
                #code-editor{width:100%;height:90px;background:#050505;color:#00f2fe;border:1px solid #333;padding:6px;font-family:monospace;font-size:11px;direction:ltr;resize:none;border-radius:4px;outline:none;white-space:pre;box-sizing:border-box}
                #code-editor:focus{border-color:#00f2fe}
                .actions-scroller{max-height:85px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:4px;padding-right:4px}
                .actions-scroller::-webkit-scrollbar{width:4px}
                .actions-scroller::-webkit-scrollbar-thumb{background:#00f2fe;border-radius:4px}
                .action-btn{background:#1a1a1a;color:#fff;border:1px solid #444;border-radius:3px;padding:6px 0;font-size:10px;cursor:pointer;text-align:center}
                .action-btn:hover{border-color:#2ed573;color:#2ed573}
                .flex-row{display:flex;gap:4px}
                .flex-row button{flex:1;padding:6px 0;font-size:10px}
            </style>
        </head>
        <body>
            <div id="game-wrapper">
                <div id="ui-layer">
                    <button id="btn-play-path" class="hud-btn" style="border-color:#2ed573;color:#2ed573;">▶ تشغيل المسار</button>
                    <button id="btn-path" class="hud-btn">محرر المسار</button>
                    <button id="btn-grid" class="hud-btn">الشبكة</button>
                    <button id="btn-camera" class="hud-btn">الكاميرا</button>
                    <button id="btn-freecam" class="hud-btn">كاميرا حرة</button>
                    <button id="btn-sleep" class="hud-btn">نوم</button>
                    <button id="btn-anim" class="hud-btn">تبديل الحركة</button>
                    <button id="btn-char" class="hud-btn">تبديل الشخصية</button>
                    <button id="btn-music" class="hud-btn">موسيقى: إيقاف</button>
                </div>
                <div id="path-panel">
                    <h3 class="panel-title">إعدادات المسار</h3>
                    <textarea id="code-editor" placeholder="[JSON Code...]"></textarea>
                    <div style="font-size:10px;color:#aaa;text-align:center;">إضافة حركة للآخر:</div>

            <label>اسم الملف الرئيسي (HTML أو JS)</label>
            <input type="text" id="add-main-file" placeholder="app.html أو app.js">
            <label>اسم ملف CSS (اختياري)</label>
            <input type="text" id="add-css-file" placeholder="style.css">
            <div class="btn-row">
                <button class="btn-primary" id="btn-confirm-add">✅ إضافة</button>
                <button class="btn-ghost" id="btn-cancel-add">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════ APP SETTINGS MODAL ═══════════════════════ -->
    <div class="modal-overlay" id="app-settings-overlay">
        <div class="modal-box">
            <h3>⚙ إعدادات التطبيق</h3>
            <label>اسم التطبيق</label>
            <input type="text" id="set-name" placeholder="اسم التطبيق">
            <label>الرابط الأساسي (Base URL)</label>
            <input type="text" id="set-base-url" placeholder="https://raw.githubusercontent.com/...">
            <label>ملف الأيقونة</label>
            <input type="text" id="set-icon-file" placeholder="A.png">
            <label>الملف الرئيسي</label>
            <input type="text" id="set-main-file" placeholder="app.html">
            <label>ملف CSS</label>
            <input type="text" id="set-css-file" placeholder="style.css">
            <div class="btn-row">
                <button class="btn-primary" id="btn-save-app">💾 حفظ وتحديث</button>
                <button class="btn-ghost" id="btn-cancel-app">إلغاء</button>
            </div>
            <button class="btn-danger btn-full" id="btn-delete-app">🗑 حذف التطبيق</button>
        </div>
    </div>

    <!-- ═══════════════════════ MASTER OS SETTINGS MODAL ═══════════════════════ -->
    <div class="modal-overlay" id="master-overlay">
        <div class="modal-box">
            <h3>🛠 إعدادات النظام المتقدمة</h3>
            <label>🔊 صوت المنصة (A04.mp3)</label>
            <input type="range" id="vol-slider" min="0" max="100" value="35" step="1">
            <div class="toggle-row">
                <span>🎬 فيديو الخلفية (A03.mp4)</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-video" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <label>📦 قاعدة بيانات التطبيقات (JSON)</label>
            <textarea id="json-export" readonly rows="8" style="direction: ltr; text-align: left;"></textarea>
            <div class="btn-row">
                <button id="btn-copy-json" class="btn-ghost" style="flex:1;">📋 نسخ</button>
                <button id="btn-import-json" class="btn-primary" style="flex:1;">📥 استيراد</button>
            </div>
            <div class="storage-info" id="storage-info">جاري الحساب...</div>
            <button class="btn-danger btn-full" id="btn-reset">⚠ إعادة ضبط المصنع</button>
            <button class="btn-ghost btn-full" id="btn-close-master">🔙 إغلاق</button>
        </div>
    </div>

    <!-- ═══════════════════════ MAIN ENGINE ═══════════════════════ -->
    <script type="module">
        // ──────────────────────────────────────
        // CONSTANTS & DEFAULTS
        // ──────────────────────────────────────
        const BASE_URL = 'https://raw.githubusercontent.com/korpika/hoolgem/main/';
        const DEFAULT_APPS = [
            { id: 1, name: 'Hool Gem', iconFile: 'A.png', mainFile: null, cssFile: null, baseUrl: BASE_URL, embedded: true }
        ];

        // ──────────────────────────────────────
        // DOM REFS
        // ──────────────────────────────────────
        const $ = (s) => document.getElementById(s);
        const bootScreen = $('boot-screen');
        const bootBtn = $('boot-btn');
        const splash = $('splash');
        const splashVideo = $('splash-video');
        const splashAudio = $('splash-audio');
        const splashProgressBar = $('splash-progress-bar');
        const splashError = $('splash-error');
        const btnSkip = $('btn-skip');
        const dashboard = $('dashboard');
        const dashVideo = $('dashboard-bg-video');
        const dashAudio = $('dashboard-audio');
        const appGrid = $('app-grid');
        const fabAdd = $('fab-add');
        const gameHost = $('game-host');
        const btnBack = $('btn-back');
        const addAppOverlay = $('add-app-overlay');
        const addAppName = $('add-name');
        const addBaseUrl = $('add-base-url');
        const addIconFile = $('add-icon-file');
        const addMainFile = $('add-main-file');
        const addCssFile = $('add-css-file');
        const btnConfirmAdd = $('btn-confirm-add');
        const btnCancelAdd = $('btn-cancel-add');
        const appSettingsOverlay = $('app-settings-overlay');
        const setAppName = $('set-name');
        const setBaseUrl = $('set-base-url');
        const setIconFile = $('set-icon-file');
        const setMainFile = $('set-main-file');
        const setCssFile = $('set-css-file');
        const btnSaveApp = $('btn-save-app');
        const btnCancelApp = $('btn-cancel-app');
        const btnDeleteApp = $('btn-delete-app');
        const masterOverlay = $('master-overlay');
        const volSlider = $('vol-slider');
        const toggleVideo = $('toggle-video');
        const jsonExport = $('json-export');
        const storageInfo = $('storage-info');
        const btnReset = $('btn-reset');
        const btnCloseMaster = $('btn-close-master');
        const btnCopyJson = $('btn-copy-json');
        const btnImportJson = $('btn-import-json');

        // ──────────────────────────────────────
        // STATE
        // ──────────────────────────────────────
        let apps = [];
        let editingAppId = null;
        let gameActive = false;
        let splashDone = false;
        const SPLASH_TIMEOUT = 12000;
        let splashTimer = null;
        let progressInterval = null;
        let splashStartMs = 0;
        let watchdogId = null;

        // ──────────────────────────────────────
        // STORAGE
        // ──────────────────────────────────────
        function loadApps() {
            try {
                const raw = localStorage.getItem('_mos_apps');
                if (raw) {
                    const arr = JSON.parse(raw);
                    if (Array.isArray(arr) && arr.length > 0) return arr;
                }
            } catch (e) { /* ignore */ }
            return JSON.parse(JSON.stringify(DEFAULT_APPS));
        }

        function saveApps() {
            try { localStorage.setItem('_mos_apps', JSON.stringify(apps)); } catch (e) { /* quota */ }
        }

        function getStorageKB() {
            let bytes = 0;
            for (const k in localStorage) {
                if (localStorage.hasOwnProperty(k)) bytes += localStorage[k].length * 2;
            }
            return (bytes / 1024).toFixed(2);
        }

        function updateStorageInfo() {
            storageInfo.innerHTML = `📦 المساحة المستهلكة: <strong>${getStorageKB()} KB</strong> من ~5120 KB`;
        }

        function exportAppsJSON() {
            jsonExport.value = JSON.stringify(apps, null, 2);
            updateStorageInfo();
        }

        function importAppsFromJSON() {
            try {
                const imported = JSON.parse(jsonExport.value);
                if (!Array.isArray(imported)) throw new Error('ليس مصفوفة');
                if (imported.length === 0) throw new Error('المصفوفة فارغة');
                apps = imported;
                saveApps();
                renderGrid();
                alert('✅ تم استيراد البيانات بنجاح وإعادة تحميل الشبكة.');
                exportAppsJSON();
            } catch (e) {
                alert('❌ فشل الاستيراد: ' + e.message);
            }
        }

        // ──────────────────────────────────────
        // RENDER GRID
        // ──────────────────────────────────────
        function resolveIconUrl(app) {
            if (app.embedded) return BASE_URL + 'A.png';
            const base = app.baseUrl || BASE_URL;
            const file = app.iconFile || 'A.png';
            return base + file;
        }

        function renderGrid() {
            appGrid.innerHTML = '';
            apps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.dataset.id = app.id;

                const img = document.createElement('img');
                img.className = 'app-icon';
                img.src = resolveIconUrl(app);
                img.alt = app.name;
                img.loading = 'lazy';
                img.onerror = () => { img.src = BASE_URL + 'A.png'; };

                const name = document.createElement('span');
                name.className = 'app-name';
                name.textContent = app.name;

                card.appendChild(img);
                card.appendChild(name);

                card.addEventListener('click', (e) => {
                    if (card.dataset.long === 'true') { card.dataset.long = 'false'; return; }
                    launch(app);
                });

                let pressTimer = null;
                const startPress = () => {
                    card.dataset.long = 'false';
                    card.classList.add('long-press');
                    pressTimer = setTimeout(() => {
                        card.dataset.long = 'true';
                        card.classList.remove('long-press');
                        openSettings(app);
                        navigator.vibrate?.(15);
                    }, 800);
                };
                const cancelPress = () => {
                    clearTimeout(pressTimer);
                    card.classList.remove('long-press');
                };
                card.addEventListener('mousedown', startPress);
                card.addEventListener('touchstart', startPress, { passive: true });
                card.addEventListener('mouseup', cancelPress);
                card.addEventListener('mouseleave', cancelPress);
                card.addEventListener('touchend', cancelPress);
                card.addEventListener('touchcancel', cancelPress);
                card.addEventListener('touchmove', cancelPress);

                appGrid.appendChild(card);
            });
        }

        // ──────────────────────────────────────
        // SPLASH
        // ──────────────────────────────────────
        function showSplashError(msg) {
            splashError.textContent = msg;
            splashError.style.display = 'block';
        }

        function updateProgress() {
            if (splashDone) return;
            const elapsed = Date.now() - splashStartMs;
            const pct = Math.min(100, (elapsed / SPLASH_TIMEOUT) * 100);
            splashProgressBar.style.width = pct + '%';
        }

        async function attemptMediaPlay(video, audio) {
            try {
                video.muted = false;
                video.volume = 0.8;
                await video.play();
            } catch (e) {
                try { video.muted = true; await video.play(); } catch (e2) {
                    showSplashError('⚠ تعذر تشغيل الفيديو الافتتاحي');
                }
            }
            try {
                audio.volume = 0.7;
                await audio.play();
            } catch (e) {
                showSplashError('🔇 الصوت يتطلب تفاعل المستخدم');
            }
        }

        function finishSplash() {
            if (splashDone) return;
            splashDone = true;
            if (progressInterval) clearInterval(progressInterval);
            if (splashTimer) clearTimeout(splashTimer);
            splash.classList.add('fade-out');
            splashVideo.pause();
            splashVideo.src = '';
            splashAudio.pause();
            splashAudio.src = '';
            setTimeout(() => {
                if (splash.parentNode) splash.remove();
            }, 800);
            dashboard.classList.remove('hidden');
            fabAdd.classList.remove('hidden');
            startDashboardMedia();
        }

        function startSplash() {
            splash.style.display = 'flex';
            splashStartMs = Date.now();
            attemptMediaPlay(splashVideo, splashAudio);

            progressInterval = setInterval(() => {
                updateProgress();
                if (splashDone) clearInterval(progressInterval);
            }, 150);

            splashTimer = setTimeout(() => {
                clearInterval(progressInterval);
                finishSplash();
            }, SPLASH_TIMEOUT);

            splashVideo.addEventListener('ended', finishSplash, { once: true });
            splashVideo.addEventListener('error', () => showSplashError('❌ فشل تحميل A01.mp4'));
            splashAudio.addEventListener('error', () => showSplashError('❌ فشل تحميل A02.mp3'));
        }

        btnSkip.addEventListener('click', (e) => {
            e.stopPropagation();
            finishSplash();
        });

        // ──────────────────────────────────────
        // DASHBOARD MEDIA
        // ──────────────────────────────────────
        function startDashboardMedia() {
            if (gameActive) return;
            dashVideo.muted = true;
            dashVideo.loop = true;
            dashVideo.play().catch(() => {});
            dashAudio.volume = (parseFloat(volSlider.value) || 35) / 100;
            dashAudio.loop = true;
            dashAudio.play().catch(() => {});
            applyVideoToggle();
            if (!watchdogId) {
                watchdogId = setInterval(reviveDashboardMedia, 2500);
            }
        }

        function applyVideoToggle() {
            if (toggleVideo.checked) {
                dashVideo.classList.remove('video-hidden');
                if (dashVideo.paused && dashVideo.src && !gameActive) {
                    dashVideo.muted = true;
                    dashVideo.play().catch(() => {});
                }
            } else {
                dashVideo.classList.add('video-hidden');
                dashVideo.pause();
            }
        }

        function reviveDashboardMedia() {
            if (gameActive) return;
            if (dashVideo.paused && dashVideo.src && toggleVideo.checked) {
                dashVideo.muted = true;
                dashVideo.play().catch(() => {});
            }
            if (dashAudio.paused && dashAudio.src) {
                dashAudio.play().catch(() => {});
            }
        }

        // ──────────────────────────────────────
        // LAUNCH / STOP (IFrame Sandbox)
        // ──────────────────────────────────────
        function launch(app) {
            if (gameActive) return;
            gameActive = true;
            dashboard.classList.add('hidden');
            fabAdd.classList.add('hidden');
            dashVideo.pause();
            dashAudio.pause();
            gameHost.classList.add('active');
            btnBack.classList.add('visible');
            gameHost.innerHTML = '';

            const iframe = document.createElement('iframe');
            iframe.allow = 'autoplay; camera; microphone';
            iframe.sandbox = 'allow-scripts allow-same-origin allow-modals';
            iframe.title = app.name;

            if (app.embedded) {
                // تطبيق اللعبة الافتراضي المضمن
                iframe.srcdoc = document.getElementById('game-template').innerHTML;
            } else {
                const base = app.baseUrl || BASE_URL;
                const mainFile = app.mainFile || '';
                const cssFile = app.cssFile || null;

                if (mainFile.endsWith('.html')) {
                    iframe.src = base + mainFile;
                } else if (mainFile.endsWith('.js')) {
                    let html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">`;
                    if (cssFile) html += `<link rel="stylesheet" href="${base + cssFile}">`;
                    html += `<style>body{margin:0;background:#000;overflow:hidden;width:100vw;height:100vh;}</style>`;
                    html += `</head><body><script src="${base + mainFile}"><\/script></body></html>`;
                    iframe.srcdoc = html;
                } else {
                    iframe.srcdoc = '<html><body style="background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100%;font-size:18px;">⚠ تنسيق الملف غير مدعوم</body></html>';
                }
            }
            gameHost.appendChild(iframe);
            gameHost._ref = iframe;
        }

        function stopGame() {
            if (!gameActive) return;
            gameActive = false;
            if (gameHost._ref) {
                gameHost._ref.src = 'about:blank';
                gameHost._ref.remove();
                gameHost._ref = null;
            }
            gameHost.innerHTML = '';
            gameHost.classList.remove('active');
            btnBack.classList.remove('visible');
            dashboard.classList.remove('hidden');
            fabAdd.classList.remove('hidden');
            startDashboardMedia();
        }

        btnBack.addEventListener('click', stopGame);

        // ──────────────────────────────────────
        // APP SETTINGS
        // ──────────────────────────────────────
        function openSettings(app) {
            editingAppId = app.id;
            setAppName.value = app.name || '';
            setBaseUrl.value = app.baseUrl || BASE_URL;
            setIconFile.value = app.iconFile || 'A.png';
            setMainFile.value = app.mainFile || '';
            setCssFile.value = app.cssFile || '';
            appSettingsOverlay.classList.add('open');
        }

        function closeSettings() {
            appSettingsOverlay.classList.remove('open');
            editingAppId = null;
        }
        btnCancelApp.addEventListener('click', closeSettings);
        appSettingsOverlay.addEventListener('click', (e) => {
            if (e.target === appSettingsOverlay) closeSettings();
        });

        btnSaveApp.addEventListener('click', () => {
            if (editingAppId === null) return;
            const idx = apps.findIndex(a => a.id === editingAppId);
            if (idx === -1) return;
            const name = setAppName.value.trim() || 'تطبيق';
            const baseUrl = setBaseUrl.value.trim() || BASE_URL;
            const iconFile = setIconFile.value.trim() || 'A.png';
            const mainFile = setMainFile.value.trim() || null;
            const cssFile = setCssFile.value.trim() || null;

            apps[idx].name = name;
            apps[idx].baseUrl = baseUrl;
            apps[idx].iconFile = iconFile;
            apps[idx].mainFile = mainFile;
            apps[idx].cssFile = cssFile;
            apps[idx].embedded = !mainFile;
            saveApps();
            renderGrid();
            closeSettings();
        });

        btnDeleteApp.addEventListener('click', () => {
            if (editingAppId === null) return;
            if (apps.length <= 1) {
                alert('⚠ لا يمكن حذف آخر تطبيق');
                return;
            }
            if (confirm('تأكيد حذف التطبيق؟')) {
                apps = apps.filter(a => a.id !== editingAppId);
                saveApps();
                renderGrid();
                closeSettings();
            }
        });

        // ──────────────────────────────────────
        // ADD APP
        // ──────────────────────────────────────
        function openAdd() {
            addAppName.value = '';
            addBaseUrl.value = BASE_URL;
            addIconFile.value = '';
            addMainFile.value = '';
            addCssFile.value = '';
            addAppOverlay.classList.add('open');
        }

        function closeAdd() {
            addAppOverlay.classList.remove('open');
        }
        fabAdd.addEventListener('click', openAdd);
        btnCancelAdd.addEventListener('click', closeAdd);
        addAppOverlay.addEventListener('click', (e) => {
            if (e.target === addAppOverlay) closeAdd();
        });

        btnConfirmAdd.addEventListener('click', () => {
            const name = addAppName.value.trim() || 'تطبيق جديد';
            const baseUrl = addBaseUrl.value.trim() || BASE_URL;
            const iconFile = addIconFile.value.trim() || 'A.png';
            const mainFile = addMainFile.value.trim() || null;
            const cssFile = addCssFile.value.trim() || null;
            const maxId = apps.reduce((m, a) => Math.max(m, a.id), 0);
            apps.push({
                id: maxId + 1,
                name,
                baseUrl,
                iconFile,
                mainFile,
                cssFile,
                embedded: !mainFile
            });
            saveApps();
            renderGrid();
            closeAdd();
        });

        // ──────────────────────────────────────
        // MASTER SETTINGS (4-finger 4-second)
        // ──────────────────────────────────────
        let fourFingerTimer = null;
        const FOUR_HOLD = 4000;

        function onTouchStart(e) {
            if (e.touches.length === 4 && !gameActive &&
                !appSettingsOverlay.classList.contains('open') &&
                !addAppOverlay.classList.contains('open') &&
                !masterOverlay.classList.contains('open')) {
                if (fourFingerTimer) clearTimeout(fourFingerTimer);
                fourFingerTimer = setTimeout(() => {
                    openMaster();
                }, FOUR_HOLD);
            }
        }

        function onTouchEnd(e) {
            if (e.touches.length < 4) {
                if (fourFingerTimer) clearTimeout(fourFingerTimer);
                fourFingerTimer = null;
            }
        }
        window.addEventListener('touchstart', onTouchStart, { passive: true });
        window.addEventListener('touchend', onTouchEnd);
        window.addEventListener('touchcancel', onTouchEnd);

        function openMaster() {
            navigator.vibrate?.([20, 40, 20]);
            volSlider.value = Math.round((dashAudio.volume || 0.35) * 100);
            toggleVideo.checked = !dashVideo.classList.contains('video-hidden');
            exportAppsJSON();
            masterOverlay.classList.add('open');
        }

        function closeMaster() {
            masterOverlay.classList.remove('open');
        }
        btnCloseMaster.addEventListener('click', closeMaster);
        masterOverlay.addEventListener('click', (e) => {
            if (e.target === masterOverlay) closeMaster();
        });

        volSlider.addEventListener('input', () => {
            dashAudio.volume = parseFloat(volSlider.value) / 100;
        });

        toggleVideo.addEventListener('change', applyVideoToggle);

        btnCopyJson.addEventListener('click', () => {
            navigator.clipboard.writeText(jsonExport.value).then(() => {
                btnCopyJson.textContent = '✅ تم النسخ';
                setTimeout(() => { btnCopyJson.textContent = '📋 نسخ'; }, 2000);
            });
        });

        btnImportJson.addEventListener('click', importAppsFromJSON);

        btnReset.addEventListener('click', () => {
            if (confirm('⚠ تحذير: سيتم مسح جميع البيانات وإعادة ضبط المصنع. متابعة؟') &&
                confirm('تأكيد نهائي: لا تراجع.')) {
                localStorage.removeItem('_mos_apps');
                apps = JSON.parse(JSON.stringify(DEFAULT_APPS));
                saveApps();
                renderGrid();
                dashAudio.volume = 0.35;
                volSlider.value = 35;
                toggleVideo.checked = true;
                applyVideoToggle();
                exportAppsJSON();
                closeMaster();
            }
        });

        // ──────────────────────────────────────
        // BOOT SEQUENCE (Power On) - مصححة بالكامل
        // ──────────────────────────────────────
        async function handlePowerOn() {
            // 1. تفعيل AudioContext بأمان تام
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass) {
                    const audioCtx = new AudioContextClass();
                    if (audioCtx.state === 'suspended') {
                        await audioCtx.resume();
                    }
                }
            } catch (e) {
                // تجاهل أي خطأ؛ المهم أن يكمل التنفيذ
                console.warn('لم يتم تفعيل AudioContext تلقائياً:', e);
            }

            // 2. إخفاء شاشة التشغيل والانتقال للافتتاحية
            bootScreen.style.display = 'none';
            startSplash();
        }

        bootBtn.addEventListener('click', handlePowerOn);

        // لمنع تشغيل الوسائط قبل الضغط
        splashVideo.muted = true;
        splashVideo.volume = 0;
        splashAudio.volume = 0;

        // ──────────────────────────────────────
        // INITIAL SETUP
        // ──────────────────────────────────────
        function init() {
            apps = loadApps();
            renderGrid();
            dashboard.classList.add('hidden');
            fabAdd.classList.add('hidden');
            splash.style.display = 'none';
            dashAudio.volume = 0.35;
            volSlider.value = 35;
            toggleVideo.checked = true;
            // شاشة التشغيل هي المرئية
            bootScreen.style.display = 'flex';
        }
        init();

        // ──────────────────────────────────────
        // PUBLIC API
        // ──────────────────────────────────────
        window.__microOS = {
            launch,
            stopGame,
            getApps: () => apps,
            refresh: () => { apps = loadApps();
                renderGrid(); },
            openMaster,
            getStorageKB,
            isGameActive: () => gameActive,
            BASE_URL,
            exportJSON: exportAppsJSON,
            importJSON: importAppsFromJSON,
        };

        console.log('%c🖥 Micro-OS v3.1 %c| %cApps: ' + apps.length + ' %c| %c' + BASE_URL,
            'color:#00e5ff;font-weight:bold;', '', 'color:#fff;', '', 'color:#888;');
    </script>
</body>
